services:
  - type: web
    name: protuario-backend
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    repo: https://github.com/fpjunior/protuario-eletronico
    branch: main
    rootDir: backend
    # ATENCAO: As variaveis de ambiente sensiveis (DATABASE_URL, JWT_SECRET, EMAIL_PASS)
    # devem ser configuradas APENAS no painel do Render (Settings -> Environment Variables).
    # NUNCA commite credenciais reais neste arquivo.
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        value: https://prontuario-eletronico-five.vercel.app
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: EMAIL_FROM
        value: e-Prontuario Alianca-PE <noreply@alianca.com>
