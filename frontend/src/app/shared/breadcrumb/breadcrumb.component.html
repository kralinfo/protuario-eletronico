  <nav
  *ngIf="breadcrumbs.length > 0 && !(breadcrumbs.length === 1 && isModuloMedico() && breadcrumbs[0].url === '/medico')"
  class="breadcrumb-nav"
  role="navigation"
  aria-label="Localização atual no sistema"
  >
  <ol class="breadcrumb-list">
    <ng-container *ngFor="let breadcrumb of breadcrumbs">
      <li
        class="breadcrumb-item"
        [class.active]="breadcrumb.isActive"
        [class.text-blue-600]="breadcrumb.isActive"
        [class.font-medium]="breadcrumb.isActive"
        *ngIf="!(breadcrumb.url === '/' && isModuloMedico())"
      >
        <!-- Breadcrumb não ativo (clicável) -->
        <a
          *ngIf="!breadcrumb.isActive"
          class="breadcrumb-link"
          [routerLink]="breadcrumb.url"
          [title]="breadcrumb.title || breadcrumb.label"
          [attr.aria-label]="'Ir para ' + breadcrumb.label"
          (click)="onBreadcrumbClick(breadcrumb)"
        >
          <span class="breadcrumb-content">
            <mat-icon
              *ngIf="breadcrumb.icon"
              class="breadcrumb-icon"
              aria-hidden="true"
            >
              {{ breadcrumb.icon }}
            </mat-icon>
            <span class="breadcrumb-label">{{ breadcrumb.label }}</span>
          </span>
        </a>

        <!-- Breadcrumb ativo (não clicável) -->
        <span
          *ngIf="breadcrumb.isActive"
          class="breadcrumb-current"
          [title]="breadcrumb.title || breadcrumb.label"
          aria-current="page"
        >
          <span class="breadcrumb-content">
            <mat-icon
              *ngIf="breadcrumb.icon"
              class="breadcrumb-icon"
              aria-hidden="true"
            >
              {{ breadcrumb.icon }}
            </mat-icon>
            <span class="breadcrumb-label">{{ breadcrumb.label }}</span>
          </span>
        </span>
      </li>
    </ng-container>
  </ol>
</nav>
