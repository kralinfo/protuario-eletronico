<div class="min-h-screen bg-gray-50 flex flex-col items-center py-10">
  <div class="w-full max-w-xl mx-auto relative mb-6">
    <!-- <button
      type="button"
      class="absolute left-0 top-1 p-2 rounded-full hover:bg-purple-50 focus:outline-none focus:ring-2 focus:ring-purple-500 transition-colors"
      (click)="goBack()">
      <svg class="h-5 w-5 text-purple-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
      </svg>
    </button> -->
    <h2 class="text-2xl font-bold text-blue-700 text-center">{{ isEdicao ? 'Editar Atendimento' : 'Novo Atendimento' }}</h2>
  </div>
  <div class="w-full max-w-4xl bg-white rounded-lg shadow p-8">
    <form (ngSubmit)="registrar()" class="grid grid-cols-1 md:grid-cols-4 gap-6">
      <div class="md:col-span-3 flex flex-col">
        <label for="paciente" class="block text-sm font-medium text-gray-700 mb-1">Pesquisar paciente</label>
        <input id="paciente" [(ngModel)]="filtroPaciente" name="filtroPaciente" placeholder="Digite o nome do paciente..." class="border rounded px-3 py-2 w-full disabled-input" style="max-width: 100%;" (ngModelChange)="onFiltroPacienteChange()" />
        <div *ngIf="pacientesFiltrados.length > 0" class="mt-2">
          <div *ngFor="let paciente of pacientesFiltrados" class="border-b py-2 cursor-pointer hover:bg-blue-50" (click)="selecionarPaciente(paciente)">
            {{ paciente.nome }} <span class="text-xs text-gray-500">{{ paciente.nascimento | date:'dd/MM/yyyy' }}</span>
          </div>
        </div>
        <div *ngIf="filtroPaciente && pacientesFiltrados.length === 0 && !pacienteSelecionado" class="mt-2 text-sm text-red-600">
          Nenhum paciente encontrado.<br>
          <span class="block mt-1">Cadastre um novo paciente para continuar.</span>
          <button type="button" (click)="abrirCadastroPaciente()" class="text-blue-600 underline mt-2">Cadastrar novo paciente</button>
        </div>
      </div>
      <div class="md:col-span-1 flex flex-col justify-end">
        <label for="horario" class="block text-sm font-medium text-gray-700 mb-1">Horário do atendimento</label>
        <input id="horario" name="horario" type="time" class="border rounded px-3 py-2 w-full" [(ngModel)]="horario" required />
      </div>
      <!-- campo de horário removido, agora está acima -->
      <div>
        <label for="motivo" class="block text-sm font-medium text-gray-700 mb-1">Motivo do atendimento</label>
        <select id="motivo" [(ngModel)]="motivo" name="motivo" required class="border rounded px-3 py-2 w-full disabled-input" [disabled]="!pacienteSelecionado">
          <option value="" disabled selected>Selecione o motivo</option>
          <option *ngFor="let m of motivosPossiveis" [value]="m">{{ m }}</option>
        </select>
      </div>
      <div class="md:col-span-2">
        <label for="acompanhante" class="block text-sm font-medium text-gray-700 mb-1">Acompanhante</label>
        <input id="acompanhante" [(ngModel)]="acompanhante" name="acompanhante" class="border rounded px-3 py-2 w-full disabled-input" [disabled]="!pacienteSelecionado" />
      </div>
      <div>
        <label for="procedencia" class="block text-sm font-medium text-gray-700 mb-1">Procedência</label>
        <input id="procedencia" [(ngModel)]="procedencia" name="procedencia" class="border rounded px-3 py-2 w-full disabled-input" [disabled]="!pacienteSelecionado" />
      </div>
      <div class="md:col-span-1">
        <label for="status" class="block text-sm font-medium text-gray-700 mb-1">Status do atendimento</label>
        <select id="status" [(ngModel)]="status" name="status" class="border rounded px-3 py-2 w-full disabled-input" [disabled]="!pacienteSelecionado" [ngModel]="'encaminhado_para_triagem'">
          <option value="encaminhado_para_triagem" selected>Encaminhado para Triagem</option>
          <option value="em_triagem">Em Triagem</option>
          <option value="encaminhado_para_sala_medica">Encaminhado para Sala Médica</option>
          <option value="em_atendimento_medico">Em Atendimento Médico</option>
          <option value="encaminhado_para_ambulatorio">Encaminhado para Ambulatório</option>
          <option value="em_atendimento_ambulatorial">Em Atendimento Ambulatorial</option>
          <option value="encaminhado_para_exames">Encaminhado para Exames</option>
        </select>
      </div>
      <div class="md:col-span-3">
        <label for="observacoes" class="block text-sm font-medium text-gray-700 mb-1">Observações</label>
        <textarea id="observacoes" [(ngModel)]="observacoes" name="observacoes" class="border rounded px-3 py-2 w-full disabled-input" style="height: 40px; resize: none;" [disabled]="!pacienteSelecionado"></textarea>
      </div>
      <div *ngIf="pacienteSelecionado" class="md:col-span-3">
        <label class="block text-sm font-medium text-gray-700 mb-1">Paciente selecionado</label>
        <div class="p-3 bg-gray-100 rounded mb-2 w-full">
          <strong>{{ pacienteSelecionado.nome }}</strong><br>
          <span class="text-xs text-gray-500">{{ pacienteSelecionado.nascimento | date:'dd/MM/yyyy' }}</span>
        </div>
        <!-- Botão de imprimir removido, permanece apenas ao lado do botão de registrar atendimento -->
      </div>
      <div *ngIf="status === 'interrompido'" class="md:col-span-4">
        <label for="motivo_interrupcao" class="block text-sm font-medium text-gray-700 mb-1">Motivo da Interrupção</label>
        <input id="motivo_interrupcao" [(ngModel)]="motivo_interrupcao" name="motivo_interrupcao" class="border rounded px-3 py-2 w-full disabled-input" [disabled]="!pacienteSelecionado" required />
      </div>
      <style>
        .disabled-input:disabled {
          background: #f3f3f3 !important;
          color: #bdbdbd !important;
          border-color: #e0e0e0 !important;
          cursor: not-allowed;
          opacity: 1;
        }
      </style>
      <div class="md:col-span-4 flex justify-center items-center gap-6 mt-6">
        <button type="submit" class="py-2 px-4 bg-blue-600 text-white font-semibold rounded-md shadow hover:bg-blue-700 transition w-1/2" [disabled]="!pacienteSelecionado">{{ isEdicao ? 'Atualizar Atendimento' : 'Registrar Atendimento' }}</button>
        <button type="button"
          class="py-2 px-8 font-semibold rounded-md shadow transition"
          [ngClass]="(!pacienteSelecionado || !motivo || !acompanhante || !procedencia || !horario || (status === 'interrompido' && !motivo_interrupcao))
            ? 'bg-gray-300 text-gray-500 cursor-not-allowed'
            : 'bg-yellow-400 text-black hover:bg-yellow-500'"
          (click)="gerarPDF()"
          [disabled]="!pacienteSelecionado || !motivo || !acompanhante || !procedencia || !horario || (status === 'interrompido' && !motivo_interrupcao)">
          Imprimir
        </button>
      </div>
      <div *ngIf="mensagem" class="text-sm text-green-700 mt-2 md:col-span-2">{{ mensagem }}</div>
    </form>
  </div>
  <app-pacientes-form *ngIf="exibirCadastroPaciente" (fechar)="onPacienteCadastrado($event)"></app-pacientes-form>
</div>
