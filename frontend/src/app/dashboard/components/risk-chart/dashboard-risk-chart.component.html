<div class="bg-white rounded-lg shadow-sm border border-gray-200 p-5 h-full flex flex-col">
  <div class="flex items-center justify-between mb-4">
    <h3 class="text-sm font-semibold text-gray-600 uppercase tracking-wide flex items-center gap-2">
      <mat-icon class="text-purple-500 !text-base">donut_large</mat-icon>
      Classificação de Risco
    </h3>
    <span class="text-xs text-gray-400" *ngIf="total > 0">{{ total }} total · {{ labelPeriodo }}</span>
  </div>

  <!-- Sem dados -->
  <div *ngIf="total === 0 && !carregando" class="flex-1 flex flex-col items-center justify-center text-gray-300 gap-2 py-6">
    <mat-icon class="!text-5xl">pie_chart</mat-icon>
    <span class="text-sm">Sem dados {{ labelPeriodo }}</span>
  </div>

  <!-- Skeleton -->
  <div *ngIf="carregando" class="flex-1 flex items-center justify-center">
    <div class="w-40 h-40 rounded-full bg-gray-100 animate-pulse"></div>
  </div>

  <!-- Gráfico SVG + legenda -->
  <div *ngIf="total > 0 && !carregando" class="flex-1 flex flex-row items-center gap-6">

    <!-- Donut SVG -->
    <div class="relative shrink-0" style="width:140px;height:140px;">
      <svg viewBox="0 0 200 200" width="140" height="140" style="overflow:visible;">
        <!-- Trilho de fundo -->
        <circle cx="100" cy="100" [attr.r]="RAIO" fill="none" stroke="#f1f5f9" stroke-width="22"/>

        <!-- Segmentos animados (exceto o hovered, que vem depois para ficar na frente) -->
        <circle
          *ngFor="let seg of segmentos; trackBy: trackBySeg"
          [style.visibility]="hoveredOriginalIndex === seg.originalIndex ? 'hidden' : 'visible'"
          cx="100" cy="100"
          [attr.r]="RAIO"
          fill="none"
          [attr.stroke]="seg.cor"
          stroke-width="22"
          stroke-linecap="round"
          [attr.transform]="'rotate(' + seg.rotateDeg + ' 100 100)'"
          [attr.stroke-dasharray]="CIRCUM + ' ' + CIRCUM"
          [attr.stroke-dashoffset]="animando ? seg.finalOffset : CIRCUM"
          [style.transition]="'stroke-dashoffset 0.9s cubic-bezier(0.4,0,0.2,1) ' + seg.delay + 's'"
          style="pointer-events: none;"
        />

        <!-- Segmento hovered renderizado por último (sempre na frente) -->
        <ng-container *ngFor="let seg of segmentos; trackBy: trackBySeg">
          <circle
            *ngIf="hoveredOriginalIndex === seg.originalIndex"
            cx="100" cy="100"
            [attr.r]="RAIO"
            fill="none"
            [attr.stroke]="seg.cor"
            stroke-width="30"
            stroke-linecap="round"
            [attr.transform]="'rotate(' + seg.rotateDeg + ' 100 100)'"
            [attr.stroke-dasharray]="CIRCUM + ' ' + CIRCUM"
            [attr.stroke-dashoffset]="seg.finalOffset"
            style="pointer-events: none; filter: drop-shadow(0 0 4px rgba(0,0,0,0.18));"
          />
        </ng-container>

        <!-- Overlay invisível: captura cliques e resolve hover por ângulo -->
        <circle
          cx="100" cy="100"
          [attr.r]="RAIO"
          fill="none"
          stroke="rgba(0,0,0,0)"
          stroke-width="26"
          style="cursor:pointer;"
          pointer-events="stroke"
          (click)="onDonutClick($event)"
          (mousemove)="onDonutHover($event)"
          (mouseleave)="hoveredOriginalIndex = null"
        />
      </svg>

      <!-- Texto central: apenas exibe, sem bloquear eventos do SVG -->
      <div class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none">
        <span class="text-2xl font-bold leading-none transition-all duration-200"
              [class.text-blue-600]="isCenterHovered"
              [class.scale-110]="isCenterHovered"
              [class.text-gray-800]="!isCenterHovered">
          {{ hoveredSeg ? hoveredSeg.valor : total }}
        </span>
        <span class="text-[10px] mt-0.5 text-center transition-all duration-200"
              [class.text-blue-500]="isCenterHovered"
              [class.text-gray-400]="!isCenterHovered"
              style="max-width:70px; line-height:1.2">
          {{ hoveredSeg ? hoveredSeg.label : 'pacientes' }}
        </span>
      </div>

      <!-- Área clicável apenas no buraco central do donut -->
      <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 rounded-full cursor-pointer"
           style="width:90px;height:90px;"
           (click)="limparFiltroClassificacao()"
           (mouseenter)="isCenterHovered = true"
           (mouseleave)="isCenterHovered = false"
           [matTooltip]="'Clique para ver todos os pacientes'">
      </div>
    </div>

    <!-- Legenda -->
    <ul class="flex-1 space-y-1 text-xs">
      <li *ngFor="let l of LABELS; let i = index"
          class="flex items-center justify-between gap-2 cursor-pointer hover:bg-gray-50 p-1 rounded-lg transition-colors group"
          [class.opacity-40]="valores[i] === 0"
          (click)="filtrarPorClassificacao(l)"
          (mouseenter)="hoveredOriginalIndex = i"
          (mouseleave)="hoveredOriginalIndex = null">
        <span class="flex items-center gap-1.5 overflow-hidden">
          <span class="inline-block w-2 h-2 rounded-full flex-shrink-0"
                [style.background-color]="COLORS[i]"></span>
          <span class="text-gray-600 group-hover:font-medium group-hover:text-gray-900 truncate">{{ l }}</span>
        </span>
        <span class="font-semibold flex items-center gap-1 shrink-0"
              [style.color]="l === 'Aguardando Triagem' ? '#94a3b8' : COLORS[i]">
          {{ valores[i] }}
          <mat-icon class="!text-[10px] !w-3 !h-3 opacity-0 group-hover:opacity-60">chevron_right</mat-icon>
        </span>
      </li>
    </ul>

  </div>
</div>
