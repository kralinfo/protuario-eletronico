<div class="bg-white rounded-lg shadow-sm border border-gray-200 hover:shadow-md transition-shadow p-5 relative overflow-hidden">
  <!-- Skeleton -->
  <div *ngIf="carregando" class="animate-pulse space-y-3">
    <div class="h-3 bg-gray-200 rounded w-2/3"></div>
    <div class="h-8 bg-gray-200 rounded w-1/3"></div>
    <div class="h-3 bg-gray-200 rounded w-1/2"></div>
  </div>

  <ng-container *ngIf="!carregando">
    <div class="flex items-start justify-between">
      <div class="flex-1 min-w-0">
        <p class="text-xs font-semibold text-gray-500 uppercase tracking-wide truncate">{{ titulo }}</p>
        <p class="text-4xl font-bold mt-1" [ngClass]="classes.valor">{{ valor }}</p>
        <p *ngIf="subtitulo" class="text-xs text-gray-400 mt-2 truncate">{{ subtitulo }}</p>
      </div>
      <div class="flex-shrink-0 ml-3 p-3 rounded-full" [ngClass]="classes.bg">
        <mat-icon [ngClass]="classes.icon">{{ icone }}</mat-icon>
      </div>
    </div>
  </ng-container>
</div>
