<div class="bg-white rounded-lg shadow-sm border border-gray-200 hover:shadow-md transition-shadow p-3 relative overflow-hidden">
  <!-- Skeleton -->
  <div *ngIf="carregando" class="animate-pulse space-y-2">
    <div class="h-2 bg-gray-200 rounded w-2/3"></div>
    <div class="h-6 bg-gray-200 rounded w-1/3"></div>
    <div class="h-2 bg-gray-200 rounded w-1/2"></div>
  </div>

  <ng-container *ngIf="!carregando">
    <div class="flex items-start justify-between">
      <div class="flex-1 min-w-0">
        <p class="text-[10px] font-semibold text-gray-400 uppercase tracking-wider truncate">{{ titulo }}</p>
        <div class="flex items-baseline gap-0.5 mt-0.5">
          <p class="text-3xl font-bold" [ngClass]="classes.valor">{{ valor }}</p>
          <span *ngIf="unidade" class="text-xs font-semibold text-gray-400 uppercase tracking-tighter">{{ unidade }}</span>
        </div>
        <p *ngIf="subtitulo" class="text-[10px] text-gray-400 mt-1 truncate">{{ subtitulo }}</p>
      </div>
      <div class="flex-shrink-0 ml-2 p-2 rounded-full" [ngClass]="classes.bg">
        <mat-icon [ngClass]="classes.icon" class="!text-xl !w-5 !h-5">{{ icone }}</mat-icon>
      </div>
    </div>
  </ng-container>
</div>
