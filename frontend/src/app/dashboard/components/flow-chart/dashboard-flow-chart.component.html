<div class="bg-white rounded-lg shadow-sm border border-gray-200 p-5 flex flex-col h-full">

  <!-- ── Linha: Atendimentos por Hora ── -->
  <div class="flex-1 flex flex-col min-h-0">
    <h3 class="text-sm font-semibold text-gray-600 uppercase tracking-wide flex items-center gap-2 mb-4 shrink-0">
      <mat-icon class="text-blue-500 !text-base">show_chart</mat-icon>

      <!-- Botão Voltar para a Semana (vindo do Dia) -->
      <button *ngIf="isFiltradoPorDia" (click)="voltarParaSemana()"
              class="flex items-center justify-center w-7 h-7 rounded-full bg-gray-100 text-gray-600 hover:bg-gray-200 transition-colors mr-2"
              matTooltip="Voltar para visão semanal">
        <mat-icon class="!text-sm !w-4 !h-4">arrow_back</mat-icon>
      </button>

      <!-- Botão Voltar para o Mês (vindo da Semana) -->
      <button *ngIf="isFiltradoPorSemana" (click)="voltarParaMes()"
              class="flex items-center justify-center w-7 h-7 rounded-full bg-gray-100 text-gray-600 hover:bg-gray-200 transition-colors mr-2"
              matTooltip="Voltar para visão mensal">
        <mat-icon class="!text-sm !w-4 !h-4">arrow_back</mat-icon>
      </button>

      <!-- Botão Voltar para os Anos (vindo do ano dentro de personalizado multi-ano) -->
      <button *ngIf="isFiltradoPorAnoPersonalizado" (click)="voltarParaPersonalizado()"
              class="flex items-center justify-center w-7 h-7 rounded-full bg-gray-100 text-gray-600 hover:bg-gray-200 transition-colors mr-2"
              matTooltip="Voltar para visão por anos">
        <mat-icon class="!text-sm !w-4 !h-4">arrow_back</mat-icon>
      </button>

      <!-- Botão Voltar para o Ano / Personalizado (vindo do Mês) -->
      <button *ngIf="isFiltradoPorMes && !isFiltradoPorSemana"
              (click)="origemMesPersonalizadoMesmoAno ? voltarParaPersonalizado() : voltarParaAno()"
              class="flex items-center justify-center w-7 h-7 rounded-full bg-gray-100 text-gray-600 hover:bg-gray-200 transition-colors mr-2"
              matTooltip="Voltar para visão anterior">
        <mat-icon class="!text-sm !w-4 !h-4">arrow_back</mat-icon>
      </button>

      {{ tituloGrafico }}
    </h3>

    <div *ngIf="carregando" class="flex-1 animate-pulse bg-gray-100 rounded min-h-[140px]"></div>

    <div *ngIf="!carregando && !dadosHora.length" class="flex-1 flex flex-col items-center justify-center text-gray-300 gap-2 min-h-[140px]">
      <mat-icon class="!text-4xl">bar_chart</mat-icon>
      <span class="text-sm">Sem dados {{ isFiltradoPorMes ? 'neste mês' : 'neste período' }}</span>
    </div>

    <div *ngIf="!carregando && dadosHora.length" class="flex-1 relative min-h-[140px]">
      <canvas #barCanvas></canvas>
    </div>
  </div>
</div>
