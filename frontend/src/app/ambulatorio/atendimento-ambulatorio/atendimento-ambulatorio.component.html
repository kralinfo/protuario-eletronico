<div class="container mx-auto p-6 bg-gray-50 rounded-lg shadow-md">
  <div class="flex items-center gap-4 mb-6">
    <button class="p-2 bg-blue-500 text-white rounded-full hover:bg-blue-600" (click)="voltarParaDashboard()">
      <mat-icon>arrow_back</mat-icon>
    </button>
    <h1 class="text-2xl font-bold text-gray-800">
      Atendimento Ambulatorial - {{nomePaciente}}
    </h1>

    <!-- Botão para alternar edição -->
    <div class="ml-auto">
      <button
        *ngIf="modoVisualizacao"
        class="px-4 py-2 rounded-lg transition-colors flex items-center gap-2 bg-green-500 text-white hover:bg-green-600"
        (click)="habilitarEdicao()">
        <mat-icon>edit</mat-icon>
        Habilitar Edição
      </button>
      <button
        *ngIf="!modoVisualizacao"
        class="px-4 py-2 rounded-lg transition-colors flex items-center gap-2 bg-orange-500 text-white hover:bg-orange-600"
        (click)="cancelarEdicao()">
        <mat-icon>visibility</mat-icon>
        Desabilitar Edição
      </button>
    </div>
  </div>

  <!-- Indicador do modo atual -->
  <div class="mb-4 p-3 rounded-lg"
       [ngClass]="modoVisualizacao ? 'bg-blue-100 border border-blue-300' : 'bg-orange-100 border border-orange-300'">
    <div class="flex items-center gap-2">
      <mat-icon [ngClass]="modoVisualizacao ? 'text-blue-600' : 'text-orange-600'">
        {{ modoVisualizacao ? 'visibility' : 'edit' }}
      </mat-icon>
      <span [ngClass]="modoVisualizacao ? 'text-blue-800' : 'text-orange-800'" class="font-medium">
        {{ modoVisualizacao ? 'Modo Visualização' : 'Modo Edição Ativado' }}
      </span>
    </div>
  </div>

  <form [formGroup]="atendimentoForm" (ngSubmit)="salvar()">
    
    <mat-accordion>
      <!-- Dados Vitais -->
      <mat-expansion-panel [expanded]="true">
        <mat-expansion-panel-header>
          <mat-panel-title>Dados Vitais</mat-panel-title>
        </mat-expansion-panel-header>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 p-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Pressão Arterial</label>
            <input class="w-full p-2 border border-gray-300 rounded" 
                   formControlName="pressao_arterial" 
                   placeholder="Ex: 120/80 mmHg">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Frequência Cardíaca</label>
            <input class="w-full p-2 border border-gray-300 rounded" 
                   formControlName="frequencia_cardiaca" 
                   placeholder="Ex: 72 bpm">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Temperatura</label>
            <input class="w-full p-2 border border-gray-300 rounded" 
                   formControlName="temperatura" 
                   placeholder="Ex: 36.5°C">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Saturação O2</label>
            <input class="w-full p-2 border border-gray-300 rounded" 
                   formControlName="saturacao_oxigenio" 
                   placeholder="Ex: 98%">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Frequência Respiratória</label>
            <input class="w-full p-2 border border-gray-300 rounded" 
                   formControlName="frequencia_respiratoria" 
                   placeholder="Ex: 16 irpm">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Peso</label>
            <input class="w-full p-2 border border-gray-300 rounded" 
                   formControlName="peso" 
                   placeholder="Ex: 70 kg">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Altura</label>
            <input class="w-full p-2 border border-gray-300 rounded" 
                   formControlName="altura" 
                   placeholder="Ex: 1.70 m">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Glicemia</label>
            <input class="w-full p-2 border border-gray-300 rounded" 
                   formControlName="glicemia" 
                   placeholder="Ex: 90 mg/dL">
          </div>
        </div>
      </mat-expansion-panel>

      <!-- Avaliação Médica (dados do atendimento médico) -->
      <mat-expansion-panel>
        <mat-expansion-panel-header>
          <mat-panel-title>Avaliação Médica (Dados do Atendimento Médico)</mat-panel-title>
        </mat-expansion-panel-header>
        <div class="p-4 space-y-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Queixa Principal</label>
            <textarea class="w-full p-2 border border-gray-300 rounded" 
                      formControlName="queixa_principal" 
                      rows="2"
                      placeholder="Queixa principal do paciente"></textarea>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">História da Doença Atual</label>
            <textarea class="w-full p-2 border border-gray-300 rounded" 
                      formControlName="historia_doenca_atual" 
                      rows="3"
                      placeholder="História detalhada da doença atual"></textarea>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Exame Físico</label>
            <textarea class="w-full p-2 border border-gray-300 rounded" 
                      formControlName="exame_fisico" 
                      rows="3"
                      placeholder="Achados do exame físico"></textarea>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Hipótese Diagnóstica</label>
            <textarea class="w-full p-2 border border-gray-300 rounded" 
                      formControlName="hipotese_diagnostica" 
                      rows="2"
                      placeholder="Hipótese diagnóstica médica"></textarea>
          </div>
        </div>
      </mat-expansion-panel>

      <!-- Atendimento Ambulatorial -->
      <mat-expansion-panel [expanded]="true">
        <mat-expansion-panel-header>
          <mat-panel-title>Atendimento Ambulatorial</mat-panel-title>
        </mat-expansion-panel-header>
        <div class="p-4 space-y-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Plano Terapêutico</label>
            <textarea class="w-full p-2 border border-gray-300 rounded" 
                      formControlName="plano_terapeutico" 
                      rows="4"
                      placeholder="Plano de tratamento e intervenções ambulatoriais"></textarea>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Medicamentos Prescritos</label>
            <textarea class="w-full p-2 border border-gray-300 rounded" 
                      formControlName="medicamentos_prescritos" 
                      rows="4"
                      placeholder="Lista de medicamentos prescritos com posologia"></textarea>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Orientações Gerais</label>
            <textarea class="w-full p-2 border border-gray-300 rounded" 
                      formControlName="orientacoes_gerais" 
                      rows="3"
                      placeholder="Orientações gerais para o paciente"></textarea>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Observações</label>
            <textarea class="w-full p-2 border border-gray-300 rounded" 
                      formControlName="observacoes" 
                      rows="3"
                      placeholder="Observações adicionais"></textarea>
          </div>
        </div>
      </mat-expansion-panel>

      <!-- Encaminhamento -->
      <mat-expansion-panel>
        <mat-expansion-panel-header>
          <mat-panel-title>Encaminhamento e Alta</mat-panel-title>
        </mat-expansion-panel-header>
        <div class="p-4 space-y-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Status de Destino</label>
            <select class="w-full p-2 border border-gray-300 rounded" 
                    formControlName="status_destino">
              <option value="">Selecione o destino</option>
              <option value="alta ambulatorial">Alta Ambulatorial</option>
              <option value="encaminhado para especialista">Encaminhado para Especialista</option>
              <option value="encaminhado para internação">Encaminhado para Internação</option>
              <option value="retorno ambulatorial">Retorno Ambulatorial</option>
              <option value="encaminhado para exames">Encaminhado para Exames</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Observações do Destino</label>
            <textarea class="w-full p-2 border border-gray-300 rounded" 
                      formControlName="observacoes_destino" 
                      rows="3"
                      placeholder="Observações sobre o encaminhamento ou alta"></textarea>
          </div>
        </div>
      </mat-expansion-panel>
    </mat-accordion>

    <!-- Botões de Ação -->
    <div class="flex gap-4 mt-6">
      <button
        type="button"
        class="px-6 py-2 bg-gray-500 text-white rounded-lg hover:bg-gray-600 transition-colors"
        (click)="cancelarAtendimento()">
        Cancelar
      </button>
      
      <button
        type="submit"
        class="px-6 py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600 transition-colors flex items-center gap-2"
        [disabled]="salvando">
        <mat-spinner diameter="20" *ngIf="salvando"></mat-spinner>
        <mat-icon *ngIf="!salvando">{{ modoVisualizacao ? 'check' : 'save' }}</mat-icon>
        {{ salvando ? 'Salvando...' : labelBotao }}
      </button>
    </div>
  </form>
</div>
