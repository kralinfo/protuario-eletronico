<section class="relative w-full min-h-screen bg-gray-50 overflow-hidden">
  <!-- Fundo decorativo -->
  <div aria-hidden="true" class="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 opacity-5 w-[90vw] max-w-6xl pointer-events-none select-none z-0">
    <img src="assets/logo-alianca.svg" alt="" class="w-full h-auto" draggable="false" />
  </div>

  <!-- Conteúdo principal -->
  <main class="relative z-10 container mx-auto px-4">
    <header class="text-center py-12">
      <h1 class="text-3xl md:text-4xl font-bold text-gray-800">Sistema de Gestão de Saúde</h1>
      <p class="mt-2 text-gray-600">Selecione o módulo desejado</p>
    </header>

    <nav class="flex flex-col items-center justify-center gap-8 pt-8 w-full">
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 w-full max-w-4xl">
        <!-- Botão Atendimento -->
        <article class="group perspective-1000">
          <a routerLink="/atendimentos" class="block w-full h-40 bg-gradient-to-br from-blue-600 to-blue-700 text-white text-2xl font-semibold rounded-xl shadow-xl hover:shadow-2xl transition-all duration-300 transform-style-preserve-3d group-hover:rotate-x-15">
            <div class="h-full flex flex-col items-center justify-center p-6 backface-hidden transform transition duration-300 group-hover:-translate-y-2">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 mb-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6" />
              </svg>
              <span>ATENDIMENTO</span>
              <span class="text-sm font-normal mt-1 opacity-80">Gerenciar consultas</span>
            </div>
          </a>
        </article>

        <!-- Botão Paciente -->
        <article class="group perspective-1000">
          <a routerLink="/pacientes" class="block w-full h-40 bg-gradient-to-br from-green-600 to-green-700 text-white text-2xl font-semibold rounded-xl shadow-xl hover:shadow-2xl transition-all duration-300 transform-style-preserve-3d group-hover:rotate-x-15">
            <div class="h-full flex flex-col items-center justify-center p-6 backface-hidden transform transition duration-300 group-hover:-translate-y-2">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 mb-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
              </svg>
              <span>PACIENTE</span>
              <span class="text-sm font-normal mt-1 opacity-80">Cadastros e históricos</span>
            </div>
          </a>
        </article>

        <!-- Botão Relatório -->
        <article class="group perspective-1000">
          <button [matMenuTriggerFor]="relatorioMenu" class="w-full h-40 bg-gradient-to-br from-yellow-500 to-yellow-600 text-white text-2xl font-semibold rounded-xl shadow-xl hover:shadow-2xl transition-all duration-300 transform-style-preserve-3d group-hover:rotate-x-15 focus:outline-none focus:ring-2 focus:ring-yellow-400 focus:ring-offset-2">
            <div class="h-full flex flex-col items-center justify-center p-6 backface-hidden transform transition duration-300 group-hover:-translate-y-2">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 mb-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
              </svg>
              <span>RELATÓRIO</span>
              <span class="text-sm font-normal mt-1 opacity-80">Dados e estatísticas</span>
            </div>
          </button>

          <mat-menu #relatorioMenu="matMenu" class="shadow-lg rounded-lg overflow-hidden">
            <button mat-menu-item [routerLink]="'/relatorios/pacientes'" class="flex items-center gap-3 px-4 py-3 hover:bg-blue-50 transition">
              <mat-icon class="text-blue-600">bar_chart</mat-icon>
              <span>Relatório de Pacientes</span>
            </button>
            <button mat-menu-item [routerLink]="'/relatorios/atendimentos'" class="flex items-center gap-3 px-4 py-3 hover:bg-blue-50 transition">
              <mat-icon class="text-blue-600">assignment</mat-icon>
              <span>Relatório de Atendimentos</span>
            </button>
          </mat-menu>
        </article>
      </div>
    </nav>
  </main>
</section>
