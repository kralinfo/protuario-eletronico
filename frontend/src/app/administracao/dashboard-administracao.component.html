<div class="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100">
  <div class="container mx-auto px-4 py-8">
    <div class="flex items-center justify-between mb-6">
      <h1 class="text-3xl font-bold text-gray-800 flex items-center">
        <mat-icon class="mr-3 text-blue-600">admin_panel_settings</mat-icon>
        Administração
      </h1>
    </div>
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 mb-8">
      <!-- Card Tempo Médio de Espera -->
      <div class="bg-white rounded-lg shadow p-6 flex flex-col items-center justify-center">
        <mat-icon class="text-purple-600 mb-2" style="font-size: 2.5rem;">timer</mat-icon>
        <div class="text-lg text-gray-700 mb-1">Tempo médio de espera</div>
        <div class="text-3xl font-bold text-purple-700">{{ tempoMedioEspera }} min</div>
        <div class="mt-2 text-sm text-gray-500">Selecione o período:</div>
        <select class="mt-1 px-2 py-1 border rounded" [(ngModel)]="periodoSelecionado" (ngModelChange)="atualizarGraficoBarra()">
          <option value="semana">Dia da semana</option>
          <option value="ano">Ano</option>
        </select>
      </div>
      <!-- Gráfico de Barra -->
      <div class="bg-white rounded-lg shadow p-6 flex flex-col items-center justify-center">
        <div class="text-lg text-gray-700 mb-2">
          {{ periodoSelecionado === 'semana' ? 'Atendimentos por dia da semana' : 'Atendimentos por mês do ano' }}
        </div>
        <canvas *ngIf="periodoSelecionado === 'semana'" id="barChartSemana" width="400" height="200"></canvas>
        <canvas *ngIf="periodoSelecionado === 'ano'" id="barChartAno" width="400" height="200"></canvas>
      </div>
      <!-- Gráfico Circular Classificação de Risco -->
      <div class="bg-white rounded-lg shadow p-6 flex flex-col items-center justify-center">
        <div class="text-lg text-gray-700 mb-2">Classificação de risco (%)</div>
        <canvas id="pieChart" width="400" height="200"></canvas>
      </div>
    </div>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
      <!-- Distribuição por Sexo -->
      <div class="bg-white rounded-lg shadow p-6 flex flex-col items-center justify-center">
        <div class="text-lg text-gray-700 mb-2">Distribuição por sexo</div>
        <canvas id="donutChart" width="400" height="200"></canvas>
      </div>
      <!-- Gráfico por Faixa Etária -->
      <div class="bg-white rounded-lg shadow p-6 flex flex-col items-center justify-center">
        <div class="text-lg text-gray-700 mb-2">Distribuição por faixa etária</div>
        <canvas id="ageChart" width="400" height="200"></canvas>
      </div>
    </div>
  </div>
</div>
