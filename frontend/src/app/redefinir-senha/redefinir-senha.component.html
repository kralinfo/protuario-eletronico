<div class="redefinir-senha-container" *ngIf="tokenValido; else tokenInvalido">
  <h2>Redefinir Senha</h2>
  <form [formGroup]="redefinirForm" (ngSubmit)="onSubmit()">
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Nova senha</mat-label>
      <input matInput type="password" formControlName="senha" required minlength="6">
      <mat-error *ngIf="redefinirForm.get('senha')?.hasError('required')">Senha obrigatória</mat-error>
      <mat-error *ngIf="redefinirForm.get('senha')?.hasError('minlength')">Mínimo 6 caracteres</mat-error>
    </mat-form-field>
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Repetir nova senha</mat-label>
      <input matInput type="password" formControlName="repetirSenha" required>
      <mat-error *ngIf="redefinirForm.get('repetirSenha')?.hasError('required')">Confirme a senha</mat-error>
      <mat-error *ngIf="redefinirForm.errors?.['senhasDiferentes']">As senhas não coincidem</mat-error>
    </mat-form-field>
    <button mat-raised-button color="primary" type="submit" [disabled]="redefinirForm.invalid || loading">
      Redefinir Senha
    </button>
    <mat-progress-bar *ngIf="loading" mode="indeterminate"></mat-progress-bar>
    <div *ngIf="error" class="error">{{ error }}</div>
    <div *ngIf="success" class="success">{{ success }}</div>
  </form>
</div>
<ng-template #tokenInvalido>
  <div class="token-invalido">
    <h2>Token inválido ou expirado</h2>
    <div *ngIf="error" class="error">{{ error }}</div>
  </div>
</ng-template>
