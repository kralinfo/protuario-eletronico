<div class="fila-atendimentos-container">
  <h2>Fila de Atendimentos Médicos</h2>
  <div *ngIf="atendimentos.length === 0" class="empty-message">
    Nenhum atendimento encaminhado para sala médica.
  </div>
  <div *ngFor="let atendimento of atendimentos" class="atendimento-card">
    <mat-card>
      <mat-card-title>{{ atendimento.paciente_nome }}</mat-card-title>
      <mat-card-content>
        <div>Status: {{ atendimento.status }}</div>
        <div>Horário: {{ atendimento.horario }}</div>
        <!-- Adicione mais campos conforme necessário -->
      </mat-card-content>
      <mat-card-actions>
        <button mat-raised-button color="primary">Iniciar Atendimento</button>
      </mat-card-actions>
    </mat-card>
  </div>
</div>
